      /* ================================================================

      function li(items) {
        return items.map((i) => `<li>${i}</li>`).join("");
      }

          t.subtitle;
        document.querySelector('[data-i18n="rights"]').textContent = t.rights;
        document.querySelector('[data-i18n="effective"]').textContent =
          t.effective;
        document.querySelector(".lang-bar label").innerHTML = t.lang_label;
        document.querySelector(".back-link").innerHTML = t.back_text;

        document.getElementById("main-content").innerHTML = `
    <p class="meta">
      ${t.meta_app}: <strong>Math Kids</strong> &nbsp;|&nbsp;
      ${t.meta_date}: <strong>${t.meta_date_val}</strong>
    </p>

    <div class="highlight">&#x2705; ${t.highlight}</div>

    <section class="card">
      <h2>${t.s1_title}</h2>
      <p>${t.s1}</p>
    </section>

    <section class="card">
      <h2>${t.s2_title}</h2>
      <p>${t.s2_p1}</p>

      }

      function switchLang(lang) {
        render(lang);
        try {
          localStorage.setItem("pp_lang", lang);
        } catch (e) {}
      }

      // Init: use saved language or browser default
      (function () {
        let saved = null;
        try {
          saved = localStorage.getItem("pp_lang");
        } catch (e) {}
        const browserLang = (navigator.language || "en")
          .slice(0, 2)
          .toLowerCase();
        const lang =
          saved && T[saved] ? saved : T[browserLang] ? browserLang : "en";
        document.getElementById("lang-select").value = lang;
        render(lang);
      })();
    </script>
